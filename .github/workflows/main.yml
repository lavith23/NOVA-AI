name: Build Nova APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Android SDK & Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Flet
        run: |
          pip install flet

      - name: Build APK
        run: |
          # Isse build process ki detail milegi
          flet build apk --verbose

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Nova-App-Final
          path: build/apk/*.apk
